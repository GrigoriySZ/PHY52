<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="./img/logo.png" alt="" id="logo">
        <a href="#" title="travel" id="logo-name">
            PACIFIC
        </a>
    </header>
    <main>

        <div class="travel-card">
            <!-- <img src="./img/abhazia.jpg" class="location-picture"> -->
            <div class="pic-holder" style="background-image: url(./img/abhazia.jpg);"></div>
            <div class="content">
                <h2>Абхазия</h2>
                <p>из Новосибирска</p>
                <ul class="time-info" type="none">
                    <li>
                        <img src="./img/clock.png" class="time-icon">
                        <p>15 марта</p>
                    </li>
                    <li>
                        <img src="./img/calendar.png" class="time-icon">
                        <p>5 ночей</p>
                    </li>
                </ul>
                <div class="price">
                    
                    <p class="sum">
                        от <strong>18 300</strong> руб.
                    </p>
                </div>
            </div>

        </div>

        <div class="travel-card">
            <div class="pic-holder" style="background-image: url(./img/turkey.jpg);"></div>
            <div class="content">
                <h2>Турция</h2>
                <p class="from">из Новосибирска</p>
                <ul class="time-info" type="none">
                    <li>
                        <img src="./img/clock.png" class="time-icon">
                        <p>7 марта</p>
                    </li>
                    <li>
                        <img src="./img/calendar.png" class="time-icon">
                        <p>7 ночей</p>
                    </li>
                </ul>
                <div class="price">
                    <p class="sum">
                        от <strong>25 720</strong> руб.
                    </p>
                </div>
            </div>

        </div>

        <div class="travel-card">
            <div class="pic-holder" style="background-image: url(./img/armenia.jpg);"></div>
            <div class="content">
                <h2>Армения</h2>
                <p>из Новосибирска</p>
                <ul class="time-info" type="none">
                    <li>
                        <img src="./img/clock.png" class="time-icon">
                        <p>21 апреля</p>
                    </li>
                    <li>
                        <img src="./img/calendar.png" class="time-icon">
                        <p>12 ночей</p>
                    </li>
                </ul>
                <div class="price">
                    <p class="sum">
                        от <strong>38 280</strong> руб.
                    </p>
                </div>
            </div>
            
        </div>

        <div class="travel-card">
            <div class="pic-holder" style="background-image: url(./img/georgia.jpg);"></div>
            <div class="content">
                <h2>Грузия</h2>
                <p>из Новосибирска</p>
                <ul class="time-info" type="none">
                    <li>
                        <img src="./img/clock.png" class="time-icon">
                        <p>17 апреля</p>
                    </li>
                    <li>
                        <img src="./img/calendar.png" class="time-icon">
                        <p>10 ночей</p>
                    </li>
                </ul>
                <div class="price">
                    <p class="sum">
                        от <strong>53 990</strong> руб.
                    </p>
                </div>
            </div>
            
        </div>

    </main>
</body>
</html>
