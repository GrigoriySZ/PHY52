<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free</title>
    <link rel="stylesheet" href="styles/reset.css">
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

    <!-- VARIABLE -->
    <link rel="stylesheet" href="styles/style.css">
</head>
<body> 
    <!-- HEADER START -->
    <header>
        <div class="wrapper">
            <div class="header_logo">
                <img src="images/logo.png" id="logo" alt="Логотип">
            </div>
            <div class="header_nav">
                <a href="#articles">Articles</a>
                <a href="#">Location</a>
                <a href="#">Video</a>
                <a href="#">Sign Up</a>
            </div>
        </div>
    </header>
    <!-- HEADER END -->
    
    <!-- MAIN START -->
    <main>
        <!-- HERO SECTION START -->
            <section id="hero">
                <div class="wrapper">
                    <h1>Travel Japan<br>freely</h1>
                    <div class="hero_button">
                        <button>Location</button>
                    </div>
                </div>
            </section>
        <!-- HERO SECTION END -->
        
        <!-- ARTICLES SECTION START -->
            <section id="articles">
                <div class="wrapper">

                    <!-- CARD 1 START -->
                    <div class="article-card">
                        <div class="place-holder" style="background-image: url('images/2_1.png');">
                            <h3>Shibuya</h3>
                        </div>
                        <div class="more-info">
                            <p>More</p>
                            <img src="images/more.png" alt="Больше">
                        </div>
                    </div>
                    <!-- CARD 1 END -->

                    <!-- CARD 2 START -->
                    <div class="article-card">
                        <div class="place-holder" style="background-image: url('images/2_2.png');">
                            <h3>Kyoto</h3>
                        </div>
                        <div class="more-info">
                            <p>More</p>
                            <img src="images/more.png" alt="Больше">
                        </div>
                    </div>
                    <!-- CARD 2 END -->

                    <!-- CART 3 START -->
                    <div class="article-card">
                        <div class="place-holder" style="background-image: url('images/2_3.png');">
                            <h3>Tokyo</h3>
                        </div>
                        <div class="more-info">
                            <p>More</p>
                            <img src="images/more.png" alt="Больше">
                        </div>
                    </div>
                    <!-- CARD 3 END -->

                    <!-- CARD 4 START -->
                    <div class="article-card">
                        <div class="place-holder" style="background-image: url('images/2_4.png');">
                            <h3>Osaka</h3>
                        </div>
                        <div class="more-info">
                            <p>More</p>
                            <img src="images/more.png" alt="Больше">
                        </div>
                    </div>
                </div>
            </section>
        <!-- ARTICLES SECTION END -->

    </main>
    <!-- MAIN END -->
</body>
</html>
