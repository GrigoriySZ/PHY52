<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good card editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- MAIN START -->
    <main>

        <!-- CONTROL PANEL START -->
        <div id="control-panel">
            <h2>Меню редактирования</h2>

            <!-- TEXT EDITION SECTION START -->
            <section id="text-editor">
                <h3>Редактирование текста</h3>
                <input type="text">
            </section>

            <!-- COLOR EDITOR SECTION START -->
            <section id="color-editor">
                <h3>Редактирование цвета</h3>
            </section>

            <!-- FORMAT EDITOR SECTION START -->
            <section id="format-editor">
                <h3>Редактирование вида</h3>
            </section>
        </div>

        <!-- PREVIEW PANEL START -->
        <div id="preview-panel">
            <div class="cards-wrap">

                <!-- PRODUCT CARD START -->
                <div class="card-conatainer">
                    <div class="card-img-container">
                        <img src="images/product-pic-1.jpg" alt="мишка">
                        <div class="actions">
                            <button id="add-to-cart" class="action-btn">
                                <svg class="action-icon" viewBox="0 0 24 24" 
                                        fill="none" stroke="currentColor" stroke-width="2" 
                                        xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="9" cy="20" r="1"></circle>
                                    <circle cx="17" cy="20" r="1"></circle>
                                    <path d="M3 4H5L7 14H18L20 8H6"  stroke-linecap="round"  stroke-linejoin="round"></path>
                                </svg>
                            </button>
                            <button id="quickview" class="action-btn">
                                <svg class="action-icon" viewBox="0 0 24 24" 
                                        fill="none" stroke="currentColor" stroke-width="2" 
                                        xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="11" cy="11" r="7"></circle>
                                    <line x1="20" y1="20" x2="16.65" y2="16.65" stroke-linecap="round"></line>
                                </svg>
                            </button>
                            <button id="wishlist" class="action-btn">
                                <svg class="action-icon" viewBox="0 0 24 24" 
                                        fill="none" stroke="currentColor" stroke-width="2" 
                                        xmlns="http://www.w3.org/2000/svg">
                                    <path d="M20 7C20 4.79 18.21 3 16 3C14.5 3 13.18 3.81 12 5.09C10.82 3.81 9.5 3 8 3C5.79 3 4 4.79 4 7C4 12 12 20 12 20C12 20 20 12 20 7Z" stroke-linecap="round" stroke-linejoin="round"></path>
                                </svg>
                                <span class="wishlist-counter">0</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="product-info">
                        <h3 class="product-title"></h3>
                        <span class="product-price"></span>
                        <p class="product-description"></p>
                    </div>
                </div>
                <!-- PRODUCT CARD END -->

            </div>
        </div>
    </main>
    
    <script src="script.js">
        
    </script>
</body>

</html>
