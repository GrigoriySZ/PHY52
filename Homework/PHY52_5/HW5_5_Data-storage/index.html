<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyQuizy</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/light.css" id="theme-style">
</head>

<body class="light">
    <!-- HEADER START -->
    <header>
        <div class="wrapper">
            <!-- HEADER LEFT SIDE -->
            <div class="logo-container">
                <img src="./images/quiz-logo.png" id="logo-icon">
                <span id="logo-text">Easy Quizy</span>
            </div>
            
            <!-- HEADER RIGHT SIDE -->
            <div class="right-side">
                <button id="theme-btn" class="theme-btn">
                    <div id="light" class="theme-icon">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" 
                                viewBox="0 0 512 512" height="200px" width="200px" 
                                xmlns="http://www.w3.org/2000/svg">
                            <path d="M234 26h44v92h-44zm0 368h44v92h-44zm104.025-251.143 
                                    65.054-65.054 31.113 31.113-65.054 65.054zM77.815 
                                    403.074l65.054-65.054 31.113 31.113-65.054 65.054zM394 
                                    234h92v44h-92zm-368 0h92v44H26zm312.029 135.14 31.112-31.113 
                                    65.054 65.054-31.112 31.112zM77.802 108.92l31.113-31.113 
                                    65.054 65.054-31.113 31.112zM256 358a102 102 0 1 1 102-102 
                                    102.12 102.12 0 0 1-102 102z"></path>
                        </svg>
                    </div>
                    <div id="dark" class="theme-icon active">
                        <svg stroke="currentColor" fill="currentColor" stroke-width="0" 
                                viewBox="0 0 512 512" height="200px" width="200px" 
                                xmlns="http://www.w3.org/2000/svg">
                            <path d="M152.62 126.77c0-33 4.85-66.35 17.23-94.77C87.54 67.83 
                                    32 151.89 32 247.38 32 375.85 136.15 480 264.62 480c95.49 
                                    0 179.55-55.54 215.38-137.85-28.42 12.38-61.8 17.23-94.77 
                                    17.23-128.47 0-232.61-104.14-232.61-232.61z"></path>
                        </svg>
                    </div>
                </button>
                <nav id="header-navigation" class="nav-container">
                    <a href="#" id="info" class="nav-btn">Info</a>
                    <a href="#" id="sign-in" class="nav-btn">Sign In</a>
                    <a href="#" id="log-out" class="nav-btn">Log Out</a>
                </nav>
            </div>
        </div>
    </header>    

    <!-- FIRST ENTER FORM -->
    <form id="greeting-form">
        <h3 class="form-title">Добро пожаловать</h3>
        <div class="form-row">
            <label for="user-first-name">Имя:</label>
            <input type="text" name="user-first-name" id="user-first-name" placeholder="Введителя ваше имя">
        </div>
        <div class="form-row">
            <label for="user-last-name">Фамилия:</label>
            <input type="text" name="user-last-name" id="user-last-name" placeholder="Введите вашу фамилию">
        </div>
        <div class="form-row">
            <label for="user-rank">Ранг:</label>
            <select name="user-rank" id="user-rank">
                <option value="beginner" selected>Новичок</option>
                <option value="master">Мастер</option>
                <option value="legedn">Легенда</option>
            </select>
        </div>
        <div id="greet-container">
        
        </div>
        <button type="submit">Войти</button>
    </form>

    <main>
        <div class="wrapper">
            <div class="game-container">
                <div id="point-counter"><span id="score">0</span> раз</div>
                <div class="game-btns">
                    <button id="answer" class="game-btn">Ответить</button>
                    <button id="blind-answer" class="game-btn">Ответить вслепую</button>
                </div>
            </div>
        </div>
    </main>


    <script src="script.js">

    </script>
</body>

</html>
