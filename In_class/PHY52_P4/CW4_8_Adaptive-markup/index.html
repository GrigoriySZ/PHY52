<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive markup</title>
    <link rel="stylesheet" href="style.css">
</head>
    <!-- Принципы адаптивной верстки: -->
    <!-- 1) Относительные единицы измерения %, em, rem, vh, vw -->
    <!-- 2) Flexbox - гибкая верстка -->
    <!-- 3) Пограничные значения (max-width, min-width, max-height, min-height) -->
    <!-- 4) Контрольные точки (медиа-запросы) -->
<body>
    <header>
        <nav>
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
            <a href="#">Link 3</a>
        </nav>
        <div id="burger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>
    <main>
        <section id="first">
            <div class="row">
                <div class="pair">
                    <div class="col"></div>
                    <div class="col"></div>
                </div>
                <div class="pair">
                    <div class="col"></div>
                    <div class="col"></div>
                </div>
            </div>
            <div class="row">
                <div class="pair">
                    <div class="col"></div>
                    <div class="col"></div>
                </div>
               <div class="pair">
                    <div class="col"></div>
                    <div class="col"></div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
