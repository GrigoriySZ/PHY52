<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        .parent {
            height: 300px;
            border: 1px solid black;
            margin: 50px;
            position: relative;
        }

        .child-1, .child-2 {
            width: 150px;
            height: 150px;
            border: 1px solid red;
            position: absolute;
            top: 10px;
            left: 10px;
        }
        .child-2 {
            background-color: blue;
            opacity: 0.3;
            top: 40px;
            left: 40px;
            z-index: 0;
        }
        .child-1:hover, .child-2:hover {
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child-1"></div>
        <div class="child-2"></div>
    </div>
</body>
</html>
