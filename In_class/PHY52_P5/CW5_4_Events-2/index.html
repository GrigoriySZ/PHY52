<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Beats - Drum Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>NEON BEATS</h1>
    <div class="controls">
        <button id="recBtn">Record</button>
        <button id="stopBtn">Stop</button>
        <button id="playBtn">Play</button>
        <div id="recIndicator" class="indicator"></div>
        <input type="range" id="volumeSlider" min="0" max="100" step="10" value="50">
        <span>Volume</span>
    </div>
    <div class="pad-grid">
        <div class="pad" style="--color: #ff0055;" data-key="A">A</div>
        <div class="pad" style="--color: #00fbff;" data-key="S">S</div>
        <div class="pad" style="--color: #72ff00;" data-key="D">D</div>
        <div class="pad" style="--color: #ffbe00;" data-key="F">F</div>
        <div class="pad" style="--color: #9b00ff;" data-key="G">G</div>
        <div class="pad" style="--color: #ff6a00;" data-key="H">H</div>
        <div class="pad" style="--color: #007bff;" data-key="J">J</div>
        <div class="pad" style="--color: #ffffff;" data-key="K">K</div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
