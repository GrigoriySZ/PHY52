        // ВАЛИДАЦИЯ 

        // 1) Встроенные (required, type="email", type="url", minlenght, maxlength, pattern);
        // 2) Кастомная валидация (функции-валидаторы)
        // 

        function validateName(name) {
            const trimName = name.trim();
            if (trimName === '') {
                return {isValid: false, error: 'Имя не может быть пустым'};
            }

            if (trimName.length < 2) {
                return { isValid: false, error: 'Имя должно быть длиннее 2х символов'}
            }

            if (!/^[a-zA-Zа-яА-Я\s]+$/.test(trimName)) {
                return { isValid: false, error: 'Имя может содержать только буквы'}
            }

            return { isValid: true, error: null};
        }

        function validatePassword(pass) {
            if (pass.length < 8) {
                return { isValid: false, error: 'Пароль должен быть длиннее 8 символов'};
            }

            if (!/\d/.test(pass)) {
                return { isValid: false, error: 'Пароль должен содержать хотя бы одну цифру'};
            }

            if (!/[A-Z]/) {
                return { isValid: false, error: 'Пароль должен содержать хотя бы одну заглавную букву'};
            }

            if (!/[!@$%^_\-&*]/) {
                return { isValid: false, error: 'Пароль должен содержать хотя бы один специальный символ (!@$%^_-&*)'};
            }

            return { isValid: true, error: null};
        }

        function showError(inputElement, errorMess) {
            const errorContainer = document.querySelector(`.errorMess[data-for="${inputElement.id}"]`);
            if (errorContainer) {
                errorContainer.textContent = errorMess;
                errorContainer.style.display = 'block';
            }

            inputElement.classList.add('invalid');
            inputElement.classList.remove('valid');

        }

        function hideError(inputElement) {
            const errorContainer = document.querySelector(`.errorMess[data-for="${inputElement.id}"]`);
            if (errorContainer) {
                errorContainer.textContent = '';
                errorContainer.style.display = 'none';
            }

            inputElement.classList.add('valid');
            inputElement.classList.remove('invalid');
        }


        const inputElements = document.querySelectorAll('input');
        let validateRes;

        inputElements.forEach(input => {
            input.style.outline = 'none';
            input.addEventListener('input', (e) => {
                if (e.target.id === 'name') {
                    validateRes = validateName(e.target.value);
                }

                if (e.target.id === 'pass') {
                    validateRes = validatePassword(e.target.value);
                }
                if (validateRes.isValid === true) {
                    hideError(e.target);
                } else {
                    
                    showError(e.target, validateRes.error);
                }
            });
        });


    </script>
